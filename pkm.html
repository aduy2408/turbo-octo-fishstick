<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Type Quiz</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d2e;
            --surface2: #232640;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8eaf6;
            --muted: #8a8fb5;
            --accent: #7c6df8;
            --correct: #4caf88;
            --wrong: #e25c5c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.2rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        header .logo span {
            color: var(--accent);
        }

        .score-bar {
            margin-left: auto;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .score-item {
            text-align: center;
        }

        .score-item .val {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .score-item .lbl {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        main {
            width: 100%;
            max-width: 900px;
            padding: 1.5rem 1rem 4rem;
        }

        /* Mode Selector */
        .modes {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.4px;
        }

        .mode-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Pokemon Card */
        .quiz-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .pokemon-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .pokemon-sprite {
            width: 90px;
            height: 90px;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        .pokemon-info {
            flex: 1;
        }

        .pokemon-name {
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: capitalize;
            letter-spacing: -0.5px;
        }

        .pokemon-num {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .type-badges {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.4rem;
        }

        .type-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .question-text {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            background: var(--surface2);
            border-radius: 10px;
            border-left: 3px solid var(--accent);
        }

        .question-text strong {
            color: var(--text);
        }

        /* Type Grid */
        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .type-check {
            position: relative;
            cursor: pointer;
        }

        .type-check input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .type-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.55rem 0.5rem;
            border-radius: 10px;
            border: 2px solid transparent;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.12s;
            user-select: none;
            opacity: 0.65;
        }

        .type-check input:checked+.type-label {
            border-color: #fff;
            opacity: 1;
            transform: scale(1.04);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
        }

        .type-label:hover {
            opacity: 0.9;
        }

        /* Result overlay on labels */
        .type-label.result-correct {
            border-color: var(--correct) !important;
            box-shadow: 0 0 0 3px rgba(76, 175, 136, 0.35) !important;
            opacity: 1 !important;
        }

        .type-label.result-wrong {
            border-color: var(--wrong) !important;
            box-shadow: 0 0 0 3px rgba(226, 92, 92, 0.35) !important;
            opacity: 1 !important;
        }

        .type-label.result-missed {
            border-color: #f5a623 !important;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.35) !important;
            opacity: 1 !important;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.65rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6a5ce8;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* Feedback */
        .feedback {
            display: none;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-size: 0.88rem;
            margin-top: 1rem;
            line-height: 1.6;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(76, 175, 136, 0.12);
            border: 1px solid rgba(76, 175, 136, 0.35);
        }

        .feedback.partial {
            background: rgba(245, 166, 35, 0.12);
            border: 1px solid rgba(245, 166, 35, 0.35);
        }

        .feedback.wrong {
            background: rgba(226, 92, 92, 0.12);
            border: 1px solid rgba(226, 92, 92, 0.35);
        }

        .feedback .result-headline {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Progress */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* Effectiveness hint table */
        .eff-table {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.8rem;
            display: none;
        }

        .eff-table.show {
            display: block;
        }

        .eff-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.2rem 0;
        }

        .eff-mult {
            font-weight: 700;
            min-width: 38px;
            text-align: right;
            font-size: 0.85rem;
        }

        .eff-types {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        /* Mode description */
        .mode-desc {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 1rem;
            padding: 0.6rem 0.9rem;
            background: var(--surface2);
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Pokémon <span>Type</span> Quiz</div>
        <div class="score-bar">
            <div class="score-item">
                <div class="val" id="s-correct" style="color:var(--correct)">0</div>
                <div class="lbl">Đúng</div>
            </div>
            <div class="score-item">
                <div class="val" id="s-wrong" style="color:var(--wrong)">0</div>
                <div class="lbl">Sai</div>
            </div>
            <div class="score-item">
                <div class="val" id="s-streak" style="color:#f5a623">0</div>
                <div class="lbl">Streak</div>
            </div>
            <div class="score-item">
                <div class="val" id="s-acc">—</div>
                <div class="lbl">Accuracy</div>
            </div>
        </div>
    </header>

    <main>
        <div style="margin-bottom:1rem; display:flex; gap:0.7rem; align-items:center; flex-wrap:wrap;">
            <div class="modes" id="modes">
                <button class="mode-btn active" data-mode="weakness">Weakness (×2)</button>
                <button class="mode-btn" data-mode="resistance">Resistance (×0.5)</button>
                <button class="mode-btn" data-mode="immunity">Immunity (×0)</button>
                <button class="mode-btn" data-mode="all">All Effectiveness</button>
            </div>
            <button class="btn btn-ghost" onclick="showHint()" id="hint-btn" style="margin-left:auto">💡 Gợi ý</button>
        </div>

        <div class="mode-desc" id="mode-desc"></div>

        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="progress-text" id="progress-text">0 / 0</div>
        </div>

        <div class="quiz-card" id="quiz-card">
            <div class="pokemon-header">
                <img class="pokemon-sprite" id="poke-sprite" src="" alt="Pokemon sprite">
                <div class="pokemon-info">
                    <div class="pokemon-num" id="poke-num">#001</div>
                    <div class="pokemon-name" id="poke-name">Bulbasaur</div>
                    <div class="type-badges" id="poke-types"></div>
                </div>
            </div>

            <div class="question-text" id="question-text"></div>

            <div class="legend">
                <span><span class="dot" style="background:var(--correct)"></span>Đúng</span>
                <span><span class="dot" style="background:var(--wrong)"></span>Sai (chọn nhầm)</span>
                <span><span class="dot" style="background:#f5a623"></span>Bỏ sót</span>
            </div>

            <div class="type-grid" id="type-grid"></div>

            <div class="eff-table" id="eff-table"></div>

            <div class="btn-row" style="margin-top:1rem">
                <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Chấm điểm</button>
                <button class="btn btn-ghost" onclick="nextPokemon()">Bỏ qua →</button>
                <button class="btn btn-ghost" id="next-btn" onclick="nextPokemon()"
                    style="display:none; background:var(--accent); color:#fff">Tiếp theo →</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>
    </main>

        const ALL_TYPES = Object.keys(TYPE_COLORS);

        const TYPE_IDS = {

            Bug: 7, Ghost: 8, Steel: 9, Fire: 10, Water: 11, Grass: 12,
            Electric: 13, Psychic: 14, Ice: 15, Dragon: 16, Dark: 17, Fairy: 18
        };

        // ============ TYPE CHART ============
        // typeChart[A][D] = multiplier when type A attacks type D
        const typeChart = {
            Normal: { Rock: 0.5, Ghost: 0, Steel: 0.5 },
            Fire: { Fire: 0.5, Water: 0.5, Grass: 2, Ice: 2, Bug: 2, Rock: 0.5, Dragon: 0.5, Steel: 2 },
            Water: { Fire: 2, Water: 0.5, Grass: 0.5, Ground: 2, Rock: 2, Dragon: 0.5 },

            Ground: { Fire: 2, Electric: 2, Grass: 0.5, Poison: 2, Flying: 0, Bug: 0.5, Rock: 2, Steel: 2 },
            Flying: { Electric: 0.5, Grass: 2, Fighting: 2, Bug: 2, Rock: 0.5, Steel: 0.5 },
            Psychic: { Fighting: 2, Poison: 2, Psychic: 0.5, Dark: 0, Steel: 0.5 },
            Bug: { Fire: 0.5, Grass: 2, Fighting: 0.5, Flying: 0.5, Psychic: 2, Ghost: 0.5, Dark: 2, Steel: 0.5, Fairy: 0.5 },
            Rock: { Fire: 2, Ice: 2, Fighting: 0.5, Ground: 0.5, Flying: 2, Bug: 2, Steel: 0.5 },
            Ghost: { Normal: 0, Psychic: 2, Ghost: 2, Dark: 0.5 },
            Dragon: { Dragon: 2, Steel: 0.5, Fairy: 0 },
            Dark: { Fighting: 0.5, Psychic: 2, Ghost: 2, Dark: 0.5, Fairy: 0.5 },
            Steel: { Fire: 0.5, Water: 0.5, Electric: 0.5, Ice: 2, Rock: 2, Steel: 0.5, Fairy: 2 },
            Fairy: { Fire: 0.5, Fighting: 2, Poison: 0.5, Dragon: 2, Dark: 2, Steel: 0.5 },
        };

        function getEffectiveness(attackerTypes, defenderTypes) {
            // Combined multiplier when pokemon with defenderTypes is attacked
            // We compute: for each attacking type, multiply all defender type resistances
            // But the quiz is about: what types are effective/resistant AGAINST this pokemon?
            // So input: defenderTypes, output: effectiveness of each attacking type
            const result = {};
            for (const atk of ALL_TYPES) {
                let mult = 1;
                for (const def of defenderTypes) {
                    const row = typeChart[atk] || {};
                    const m = row[def] !== undefined ? row[def] : 1;
                    mult *= m;
                }
                result[atk] = mult;
            }
            return result;

        // ============ GAME STATE ============
        let state = {
            mode: 'weakness',
            current: null,
            answered: false,
            correct: 0,
            wrong: 0,
            streak: 0,
            total: 0,
            history: [],
        };

        const MODE_DESCS = {
            weakness: 'Chọn tất cả các hệ có hiệu quả ×2 (hoặc ×4) khi tấn công Pokémon này.',
            resistance: 'Chọn tất cả các hệ có hiệu quả ×0.5 (hoặc ×0.25) khi tấn công Pokémon này.',
            immunity: 'Chọn tất cả các hệ không gây sát thương (×0) cho Pokémon này.',
            all: 'Tick hệ tương ứng: ×4 / ×2 / ×0.5 / ×0.25 / ×0. Bonus: đúng multiplier!'
        };

        function getCorrectTypes(eff, mode) {
            if (mode === 'weakness') return ALL_TYPES.filter(t => eff[t] > 1);
            if (mode === 'resistance') return ALL_TYPES.filter(t => eff[t] < 1 && eff[t] > 0);
            if (mode === 'immunity') return ALL_TYPES.filter(t => eff[t] === 0);
            if (mode === 'all') return ALL_TYPES.filter(t => eff[t] !== 1);
            return [];
        }

        function randomPokemon() {
            return POKEMON[Math.floor(Math.random() * POKEMON.length)];
        }

        function renderTypeBadge(type, extra) {
            const c = TYPE_COLORS[type] || { bg: '#888', text: '#fff' };
            const typeId = TYPE_IDS[type] || 1;
            const iconUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/types/generation-viii/sword-shield/${typeId}.png`;
            return `
            <span class="type-badge" style="background:${c.bg};color:${c.text};display:inline-flex;align-items:center;gap:4px;">
                <img src="${iconUrl}" style="height:12px;width:auto;" alt="${type}">
                ${type}${extra || ''}
            </span>`;
        }

        function buildTypeGrid(disabled) {
            const grid = document.getElementById('type-grid');
            grid.innerHTML = '';
            for (const t of ALL_TYPES) {
                const c = TYPE_COLORS[t];
                const div = document.createElement('label');
                div.className = 'type-check';
                div.innerHTML = `
      <input type="checkbox" value="${t}" id="chk_${t}" ${disabled ? 'disabled' : ''}>
      <div class="type-label" id="lbl_${t}" style="background:${c.bg};color:${c.text}">
        ${t}
      </div>`;
                grid.appendChild(div);
            }
            // sync checkbox -> label
            for (const t of ALL_TYPES) {
                const inp = document.getElementById('chk_' + t);
                const lbl = document.getElementById('lbl_' + t);
                inp.addEventListener('change', () => {
                    lbl.style.outline = inp.checked ? '2px solid #fff' : 'none';
                });
            }
        }

        async function nextPokemon() {
            state.answered = false;
            
            // Loading state
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            document.getElementById('poke-name').textContent = 'Loading...';
            document.getElementById('poke-sprite').style.opacity = '0.5';

            let poke;
            try {
                // Lấy ngẫu nhiên 1 trong 1025 Pokemon từ PokeAPI
                const randomId = Math.floor(Math.random() * 1025) + 1;
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await res.json();
                
                poke = {
                    id: data.id,
                    name: data.name.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' '),
                    types: data.types.map(t => t.type.name.charAt(0).toUpperCase() + t.type.name.slice(1)),
                    spriteUrl: data.sprites.other['official-artwork'].front_default || data.sprites.front_default || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${data.id}.png`
                };
            } catch (e) {
                // Fallback nếu lỗi mạng
                poke = randomPokemon();
                poke.spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png`;
            }

            state.current = poke;
            state.total++;

            // sprite
            const spriteEl = document.getElementById('poke-sprite');
            spriteEl.src = poke.spriteUrl;
            spriteEl.onerror = function () {
                this.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png`;
            };
            spriteEl.style.opacity = '1';

            document.getElementById('poke-num').textContent = '#' + String(poke.id).padStart(3, '0');
            document.getElementById('poke-name').textContent = poke.name;

            // type badges
            const typesEl = document.getElementById('poke-types');
            typesEl.innerHTML = poke.types.map(t => renderTypeBadge(t)).join('');

            // question
            const qEl = document.getElementById('question-text');
            const modeLabel = { weakness: 'điểm yếu (×2 hoặc ×4)', resistance: 'kháng (×0.5 hoặc ×0.25)', immunity: 'miễn nhiễm (×0)', all: 'hiệu quả khác 1' };
            qEl.innerHTML = `<strong>${poke.name}</strong> có <strong>${modeLabel[state.mode]}</strong> với những hệ nào?`;

            buildTypeGrid(false);
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('eff-table').className = 'eff-table';
            
            document.getElementById('submit-btn').style.display = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('next-btn').disabled = false;
            document.getElementById('hint-btn').textContent = '💡 Gợi ý';
            updateProgress();
        }

        function submitAnswer() {
            if (state.answered) return;
            state.answered = true;

            const poke = state.current;
            const eff = getEffectiveness(ALL_TYPES, poke.types);
            const correct = new Set(getCorrectTypes(eff, state.mode));
            const selected = new Set(
                Array.from(document.querySelectorAll('#type-grid input:checked')).map(i => i.value)
            );

            // Disable all checkboxes
            document.querySelectorAll('#type-grid input').forEach(i => i.disabled = true);

            // Color labels
            for (const t of ALL_TYPES) {
                const lbl = document.getElementById('lbl_' + t);
                lbl.classList.remove('result-correct', 'result-wrong', 'result-missed');
                if (selected.has(t) && correct.has(t)) lbl.classList.add('result-correct');
                else if (selected.has(t) && !correct.has(t)) lbl.classList.add('result-wrong');
                else if (!selected.has(t) && correct.has(t)) lbl.classList.add('result-missed');
            }

            const truePos = [...selected].filter(t => correct.has(t)).length;
            const falsePos = [...selected].filter(t => !correct.has(t)).length;
            const falseNeg = [...correct].filter(t => !selected.has(t)).length;
            const isPerfect = falsePos === 0 && falseNeg === 0;
            const isPartial = truePos > 0 && (falsePos > 0 || falseNeg > 0);

            if (isPerfect) {
                state.correct++;
                state.streak++;
            } else {
                state.wrong++;
                state.streak = 0;
            }

            // Feedback
            const fb = document.getElementById('feedback');
            if (isPerfect) {
                fb.className = 'feedback show correct';
                fb.innerHTML = `<div class="result-headline">✅ Hoàn hảo! +1 điểm</div>
      ${correct.size === 0 ? 'Không có hệ nào thỏa điều kiện cho Pokémon này.' :
                        'Đúng hết: ' + [...correct].map(t => renderTypeBadge(t, state.mode === 'all' ? ' ×' + multLabel(eff[t]) : '')).join('')}`;
            } else if (correct.size === 0 && selected.size === 0) {
                state.correct++; state.wrong--;
                fb.className = 'feedback show correct';
                fb.innerHTML = '<div class="result-headline">✅ Đúng! Không có hệ nào thỏa điều kiện.</div>';
            } else {
                fb.className = 'feedback show ' + (isPartial ? 'partial' : 'wrong');
                const lines = [];
                if (falsePos > 0) lines.push('❌ Chọn sai: ' + [...selected].filter(t => !correct.has(t)).map(t => renderTypeBadge(t)).join(''));
                if (falseNeg > 0) lines.push('⚠️ Bỏ sót: ' + [...correct].filter(t => !selected.has(t)).map(t => renderTypeBadge(t, state.mode === 'all' ? ' ×' + multLabel(eff[t]) : '')).join(''));
                if (truePos > 0) lines.push('✅ Đúng: ' + [...selected].filter(t => correct.has(t)).map(t => renderTypeBadge(t)).join(''));
                fb.innerHTML = `<div class="result-headline">${isPerfect ? '✅' : isPartial ? '⚠️ Gần đúng' : '❌ Sai'}</div>${lines.join('<br>')}`;
            }

            // Show effectiveness table for "all" mode or always
            if (state.mode === 'all') showEffTable(eff);

            updateScore();
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = '';
        }

        function multLabel(v) {
            if (v === 4) return '×4';
            if (v === 2) return '×2';
            if (v === 0.5) return '×½';
            if (v === 0.25) return '×¼';
            if (v === 0) return '×0';
            return '×' + v;
        }

        function showEffTable(eff) {
            const groups = { 4: [], 2: [], 0.5: [], 0.25: [], 0: [], 1: [] };
            for (const t of ALL_TYPES) {
                const v = eff[t];
                if (groups[v]) groups[v].push(t);
                else groups[1].push(t);
            }
            const labels = { 4: '×4 (×4)', 2: '×2', 0.5: '×½', 0.25: '×¼', 0: '×0 (miễn nhiễm)', 1: '×1 (bình thường)' };
            const colors = { 4: '#e25c5c', 2: '#f5a623', 0.5: '#4caf88', 0.25: '#4c9baf', 0: '#7c6df8', 1: 'var(--muted)' };
            let html = '';
            for (const [val, types] of Object.entries(groups)) {
                if (types.length === 0) continue;
                html += `<div class="eff-row">
      <span class="eff-mult" style="color:${colors[val]}">${labels[val]}</span>
      <span class="eff-types">${types.map(t => renderTypeBadge(t)).join('')}</span>
    </div>`;
            }
            const el = document.getElementById('eff-table');
            el.innerHTML = html;
            el.className = 'eff-table show';
        }

        function showHint() {
            if (state.answered) return;
            const poke = state.current;
            const eff = getEffectiveness(ALL_TYPES, poke.types);
            showEffTable(eff);
            document.getElementById('hint-btn').textContent = '👁 Đang xem gợi ý';
        }

        function updateScore() {
            document.getElementById('s-correct').textContent = state.correct;
            document.getElementById('s-wrong').textContent = state.wrong;
            document.getElementById('s-streak').textContent = state.streak;
            const total = state.correct + state.wrong;
            document.getElementById('s-acc').textContent = total > 0 ? Math.round(state.correct / total * 100) + '%' : '—';
        }

        function updateProgress() {
            const total = state.correct + state.wrong;
            const pct = total > 0 ? Math.round(state.correct / total * 100) : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent = `${state.correct} đúng / ${total} câu`;
        }

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;
                document.getElementById('mode-desc').textContent = MODE_DESCS[state.mode];
                nextPokemon();
            });
        });

        // Init
        document.getElementById('mode-desc').textContent = MODE_DESCS[state.mode];
        nextPokemon();
        updateScore();
    </script>
</body>

</html>
